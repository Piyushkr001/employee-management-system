<svg
  width="420"
  height="100"
  viewBox="0 0 420 100"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-labelledby="empnexa-wordmark-title empnexa-wordmark-description"
>
  <title id="empnexa-wordmark-title">EmpNexa Logo</title>
  <desc id="empnexa-wordmark-description">
    EmpNexa employee management system text-based logo
  </desc>

  <defs>
    <linearGradient
      id="empnexaTextGradient"
      x1="20"
      y1="20"
      x2="390"
      y2="85"
      gradientUnits="userSpaceOnUse"
    >
      <stop stop-color="#4F46E5" />
      <stop offset="0.55" stop-color="#7C3AED" />
      <stop offset="1" stop-color="#2563EB" />
    </linearGradient>
  </defs>

  <!-- Brand symbol -->
  <rect
    x="10"
    y="10"
    width="80"
    height="80"
    rx="22"
    fill="url(#empnexaTextGradient)"
  />

  <!-- Stylized E -->
  <path
    d="M32 30H67"
    stroke="white"
    stroke-width="8"
    stroke-linecap="round"
  />
  <path
    d="M32 50H59"
    stroke="white"
    stroke-width="8"
    stroke-linecap="round"
  />
  <path
    d="M32 70H67"
    stroke="white"
    stroke-width="8"
    stroke-linecap="round"
  />
  <path
    d="M32 30V70"
    stroke="white"
    stroke-width="8"
    stroke-linecap="round"
  />

  <!-- Connected hierarchy nodes -->
  <circle cx="71" cy="30" r="5" fill="#C4B5FD" />
  <circle cx="63" cy="50" r="5" fill="#DDD6FE" />
  <circle cx="71" cy="70" r="5" fill="#BFDBFE" />

  <!-- Wordmark -->
  <text
    x="108"
    y="64"
    fill="#f3f3f3ff"
    font-family="Inter, Arial, Helvetica, sans-serif"
    font-size="48"
    font-weight="700"
    letter-spacing="-1.5"
  >
    Emp
  </text>

  <text
    x="205"
    y="64"
    fill="url(#empnexaTextGradient)"
    font-family="Inter, Arial, Helvetica, sans-serif"
    font-size="48"
    font-weight="800"
    letter-spacing="-1.5"
  >
    Nexa
  </text>

  <!-- Tagline -->
  <text
    x="110"
    y="84"
    fill="#6B7280"
    font-family="Inter, Arial, Helvetica, sans-serif"
    font-size="12"
    font-weight="500"
    letter-spacing="1.2"
  >
    MANAGE PEOPLE. BUILD BETTER TEAMS.
  </text>
</svg>